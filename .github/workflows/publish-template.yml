name: Publish Template

on:
  workflow_call:
    inputs:
      product:
        description: "Product name (e.g. access-token-management, identity-model)"
        required: true
        type: string
      solution:
        description: "Repo-relative path to solution filter (e.g. access-token-management/access-token-management.slnf)"
        required: true
        type: string
    secrets:
      SignClientSecret:
        required: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  pack:
    name: Pack, sign & push
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      packages: write
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          global-json-file: global.json
          source-url: https://nuget.pkg.github.com/DuendeSoftware/index.json
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Tool restore
        run: dotnet tool restore
      - name: Pack
        run: dotnet pack -c Release ${{ inputs.solution }} -o ${{ inputs.product }}/artifacts
      - name: Sign packages
        env:
          SIGN_SECRET: ${{ secrets.SignClientSecret }}
        run: |
          shopt -s nullglob
          for file in ${{ inputs.product }}/artifacts/*.nupkg; do
            dotnet NuGetKeyVaultSignTool sign "$file" \
              --file-digest sha256 \
              --timestamp-rfc3161 http://timestamp.digicert.com \
              --azure-key-vault-url https://duendecodesigninghsm.vault.azure.net/ \
              --azure-key-vault-client-id 18e3de68-2556-4345-8076-a46fad79e474 \
              --azure-key-vault-tenant-id ed3089f0-5401-4758-90eb-066124e2d907 \
              --azure-key-vault-client-secret "$SIGN_SECRET" \
              --azure-key-vault-certificate NuGetPackageSigning
          done
      - name: Push to GitHub NuGet
        if: github.ref == 'refs/heads/main'
        run: dotnet nuget push ${{ inputs.product }}/artifacts/*.nupkg --source https://nuget.pkg.github.com/DuendeSoftware/index.json --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate
      - name: Upload artifacts
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: artifacts
          path: ${{ inputs.product }}/artifacts/*.nupkg
          overwrite: true
          retention-days: 15
