name: razor-slices/ci

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - release-*
    paths:
      - .config/dotnet-tools.json
      - .github/BuildHelpers/**
      - .github/workflows/razor-slices-**
      - .github/workflows/ci-template.yml
      - razor-slices/**
      - .editorconfig
      - Directory.Packages.props
      - global.json
      - src.props
      - test.props
  pull_request:
    paths:
      - .config/dotnet-tools.json
      - .github/BuildHelpers/**
      - .github/workflows/razor-slices-**
      - .github/workflows/ci-template.yml
      - razor-slices/**
      - .editorconfig
      - Directory.Packages.props
      - global.json
      - src.props
      - test.props

jobs:
  build:
    uses: ./.github/workflows/ci-template.yml
    with:
      product: razor-slices
      test-targets: '["test-razor-slices","test-source-generator"]'
