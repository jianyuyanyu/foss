name: memory-cache/ci

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - release-*
    paths:
      - .config/dotnet-tools.json
      - .github/BuildHelpers/**
      - .github/workflows/memory-cache-**
      - .github/workflows/ci-template.yml
      - memory-cache/**
      - .editorconfig
      - Directory.Packages.props
      - global.json
      - src.props
      - test.props
  pull_request:
    paths:
      - .config/dotnet-tools.json
      - .github/BuildHelpers/**
      - .github/workflows/memory-cache-**
      - .github/workflows/ci-template.yml
      - memory-cache/**
      - .editorconfig
      - Directory.Packages.props
      - global.json
      - src.props
      - test.props

jobs:
  build:
    uses: ./.github/workflows/ci-template.yml
    with:
      product: memory-cache
      test-targets: '["test"]'
