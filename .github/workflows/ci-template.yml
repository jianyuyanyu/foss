name: CI Template

on:
  workflow_call:
    inputs:
      product:
        description: "Product name (e.g. access-token-management, identity-model)"
        required: true
        type: string
      test-targets:
        description: 'JSON array of build.cs test targets (e.g. ["test"]). Empty array or "[]" to skip.'
        required: false
        type: string
        default: "[]"
      os-matrix:
        description: 'JSON array of OS runners for the test job (e.g. ["ubuntu-latest","windows-latest"]). Defaults to ubuntu only.'
        required: false
        type: string
        default: '["ubuntu-latest"]'

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  check-formatting:
    name: Check formatting
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          global-json-file: global.json
      - name: Check formatting
        run: dotnet run ${{ inputs.product }}/build.cs -- check-formatting

  check-no-changes:
    name: Check no changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          global-json-file: global.json
      - name: Check no changes
        run: dotnet run ${{ inputs.product }}/build.cs -- check-no-changes

  test:
    name: "Test: ${{ matrix.target }} (${{ matrix.os }})"
    if: inputs.test-targets != '[]'
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        target: ${{ fromJson(inputs.test-targets) }}
        os: ${{ fromJson(inputs.os-matrix) }}
      fail-fast: false
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          global-json-file: global.json
      - name: Test
        run: dotnet run ${{ inputs.product }}/build.cs -- ${{ matrix.target }}
      - name: Test report
        if: success() || failure()
        uses: phoenix-actions/test-reporting@f957cd93fc2d848d556fa0d03c57bc79127b6b5e
        with:
          name: "${{ inputs.product }}: ${{ matrix.target }} (${{ matrix.os }})"
          path: "**/*-tests.trx"
          reporter: dotnet-trx
          output-to: step-summary
          fail-on-error: true
