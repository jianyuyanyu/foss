name: ignore-this/ci

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - release-*
    paths:
      - .config/dotnet-tools.json
      - .github/BuildHelpers/**
      - .github/workflows/ignore-this-**
      - .github/workflows/ci-template.yml
      - ignore-this/**
      - .editorconfig
      - Directory.Packages.props
      - global.json
      - src.props
      - test.props
  pull_request:
    paths:
      - .config/dotnet-tools.json
      - .github/BuildHelpers/**
      - .github/workflows/ignore-this-**
      - .github/workflows/ci-template.yml
      - ignore-this/**
      - .editorconfig
      - Directory.Packages.props
      - global.json
      - src.props
      - test.props

jobs:
  build:
    uses: ./.github/workflows/ci-template.yml
    with:
      product: ignore-this
      test-targets: '["test"]'
